name: Claude Code

# Drive this repo from the cloud — including GitHub Mobile.
# Triggers:
#   - Comment "@claude <task>" on any issue or PR  (works great from mobile)
#   - Run this workflow manually with a "prompt" input  (workflow_dispatch)
#   - POST a repository_dispatch event of type "claude" with client_payload.prompt
#     (e.g. from an iOS Shortcut / curl on your phone)
#
# Secret required: ANTHROPIC_API_KEY  (or swap for claude_code_oauth_token to use
# your Claude subscription — see the commented line below).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Task for Claude to perform"
        required: true
        type: string
  repository_dispatch:
    types: [claude]

jobs:
  claude:
    # Only run on an explicit dispatch or a "@claude" mention.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Uses your Claude subscription (no extra API billing).
          # Mint once with `claude setup-token`, store as CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # For workflow_dispatch / repository_dispatch, pass the prompt through.
          # For "@claude" comments this is empty and the action reads the comment.
          prompt: ${{ github.event.inputs.prompt || github.event.client_payload.prompt || '' }}
